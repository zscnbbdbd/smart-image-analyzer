<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分析历史 - 智能图片分析系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">
                <span class="brand-icon">🧠</span> 智能图片分析系统
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">分析</a>
                <a class="nav-link active" href="/history">历史记录</a>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <h3 class="mb-4">📋 分析历史记录</h3>
        <div class="card shadow-sm">
            <div class="card-body">
                <div th:if="${#lists.isEmpty(records)}" class="text-center py-5 text-muted">
                    <p style="font-size: 3rem;">📭</p>
                    <p>暂无分析记录，去上传一张图片吧！</p>
                    <a href="/" class="btn btn-primary">开始分析</a>
                </div>
                <div th:unless="${#lists.isEmpty(records)}">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>文件名</th>
                                    <th>预测结果</th>
                                    <th>文件大小</th>
                                    <th>分析时间</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="r : ${records}">
                                    <td th:text="${r.id}">1</td>
                                    <td th:text="${r.originalName}">image.jpg</td>
                                    <td th:text="${r.topPrediction}">cat (95%)</td>
                                    <td th:text="${#numbers.formatInteger(r.fileSize, 0)} + ' KB'">123 KB</td>
                                    <td th:text="${#temporals.format(r.createdAt, 'yyyy-MM-dd HH:mm:ss')}">2024-01-01</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
